<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E63946">
  <meta name="description" content="100 Awesome Drama Games for High School Students by Justin Cash">
  <title>100 Awesome Drama Games</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E63946;
      --yellow: #FFD60A;
      --blue: #0A2463;
      --cyan: #00B4D8;
      --black: #0D0D0D;
      --white: #FFFFFF;
      --card-shadow: 7px 7px 0 var(--black);
      --card-shadow-hover: 11px 11px 0 var(--black);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── BODY: deep navy with bold yellow Ben-Day dots ── */
    body {
      font-family: 'Barlow', sans-serif;
      background-color: var(--blue);
      background-image: radial-gradient(circle, var(--yellow) 4px, transparent 4px);
      background-size: 28px 28px;
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--red);
      color: var(--yellow);
      position: relative;
      overflow: hidden;
      border-bottom: 6px solid var(--black);
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.13) 3px, transparent 3px);
      background-size: 20px 20px;
    }
    .header-inner {
      position: relative;
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 28px 16px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .logo-link {
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .logo-icon {
      width: 68px;
      height: 68px;
      filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.45));
      cursor: pointer;
    }
    .header-text h1 {
      font-family: 'Anton', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.6rem);
      line-height: 1.0;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--yellow);
      text-shadow: 4px 4px 0 rgba(0,0,0,0.4);
    }
    .header-text .subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.88);
      margin-top: 4px;
    }

    /* ── SEARCH BAR: black strip for max drama ── */
    .search-wrap {
      background: var(--black);
      border-top: 4px solid var(--black);
      border-bottom: 6px solid var(--yellow);
      padding: 14px 28px;
    }
    .search-inner {
      max-width: 1280px;
      margin: 0 auto;
      position: relative;
    }
    #search {
      width: 100%;
      padding: 14px 56px 14px 22px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      border: 4px solid var(--yellow);
      border-radius: 0;
      background: var(--white);
      color: var(--black);
      outline: none;
      box-shadow: 5px 5px 0 var(--yellow);
      transition: box-shadow 0.1s;
    }
    #search:focus {
      box-shadow: 7px 7px 0 var(--yellow);
    }
    #search::placeholder {
      color: #999;
      font-weight: 400;
    }
    .search-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.35rem;
      pointer-events: none;
    }

    /* ── MAIN CONTENT ── */
    main {
      flex: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 28px;
      width: 100%;
    }

    /* ── HOME VIEW ── */
    #home-view {}

    /* ── ALPHA SECTION: comic-panel chapter header ── */
    .alpha-section { margin-bottom: 44px; }

    .alpha-heading {
      font-family: 'Anton', sans-serif;
      font-size: 3rem;
      line-height: 1;
      letter-spacing: 0.06em;
      color: var(--yellow);
      background: var(--black);
      display: inline-block;
      padding: 6px 22px 8px;
      margin-bottom: 16px;
      border: 4px solid var(--yellow);
      box-shadow: 6px 6px 0 var(--yellow);
      position: relative;
    }

    /* ── GAME CARDS ── */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .game-card {
      border: 4px solid var(--black);
      background: var(--white);
      padding: 0;
      cursor: pointer;
      position: relative;
      box-shadow: var(--card-shadow);
      transition: transform 0.09s, box-shadow 0.09s;
      text-decoration: none;
      display: block;
      color: inherit;
      overflow: hidden;
    }
    /* Thick colour bar at top of each card */
    .game-card::before {
      content: '';
      display: block;
      height: 10px;
    }
    .game-card:nth-child(5n+1)::before { background: var(--red); }
    .game-card:nth-child(5n+2)::before { background: var(--yellow); }
    .game-card:nth-child(5n+3)::before { background: var(--cyan); }
    .game-card:nth-child(5n+4)::before { background: var(--blue); }
    .game-card:nth-child(5n+0)::before { background: var(--red); }

    .game-card:hover {
      transform: translate(-3px, -3px);
      box-shadow: var(--card-shadow-hover);
      background: #FFFDF0;
    }
    .game-card:active {
      transform: translate(3px, 3px);
      box-shadow: 3px 3px 0 var(--black);
    }

    .card-inner {
      padding: 14px 16px 16px;
    }
    .card-num {
      font-family: 'Anton', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--red);
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.08rem;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--black);
    }
    .card-players {
      font-size: 0.78rem;
      color: #555;
      margin-top: 7px;
      font-style: italic;
    }

    /* ── NO RESULTS ── */
    .no-results {
      text-align: center;
      padding: 60px 24px;
    }
    .no-results h2 {
      font-family: 'Anton', sans-serif;
      font-size: 2.5rem;
      color: var(--yellow);
      text-shadow: 4px 4px 0 var(--black);
      margin-bottom: 10px;
    }
    .no-results p { color: rgba(255,255,255,0.7); font-size: 1rem; }

    /* ── GAME DETAIL VIEW ── */
    #game-view { display: none; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--black);
      background: var(--yellow);
      border: 4px solid var(--black);
      padding: 10px 20px;
      cursor: pointer;
      margin-bottom: 24px;
      box-shadow: 5px 5px 0 var(--black);
      transition: transform 0.08s, box-shadow 0.08s;
    }
    .back-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0 var(--black);
    }
    .back-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 3px 3px 0 var(--black);
    }

    .game-detail {
      border: 5px solid var(--black);
      box-shadow: 8px 8px 0 var(--black);
      background: var(--white);
      overflow: hidden;
    }

    .game-detail-header {
      background: var(--red);
      color: var(--yellow);
      padding: 28px 32px 24px;
      position: relative;
      overflow: hidden;
      border-bottom: 5px solid var(--black);
    }
    .game-detail-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.11) 3px, transparent 3px);
      background-size: 18px 18px;
    }
    .game-detail-header-content { position: relative; }

    .game-detail-num {
      font-family: 'Anton', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
    }
    .game-detail-title {
      font-family: 'Anton', sans-serif;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      line-height: 1.0;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      text-shadow: 4px 4px 0 rgba(0,0,0,0.4);
      margin: 6px 0 14px;
    }
    .game-detail-players {
      display: inline-block;
      background: var(--yellow);
      color: var(--black);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.92rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border: 3px solid var(--black);
      box-shadow: 3px 3px 0 var(--black);
    }

    .game-detail-body { background: var(--white); }

    .game-section {
      padding: 24px 32px;
      border-bottom: 3px solid var(--black);
    }
    .game-section:last-child { border-bottom: none; }

    .section-label {
      font-family: 'Anton', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--white);
      background: var(--black);
      display: inline-block;
      padding: 4px 12px;
      margin-bottom: 14px;
    }

    .section-text {
      font-size: 1rem;
      line-height: 1.68;
      color: #1a1a1a;
    }

    .prompts-intro {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 12px;
    }

    .prompt-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .prompt-list li {
      display: flex;
      gap: 12px;
      font-size: 0.97rem;
      line-height: 1.55;
      padding: 8px 12px;
      background: #f7f7f7;
      border-left: 4px solid var(--red);
    }
    .prompt-list li::before {
      content: '▶';
      color: var(--red);
      font-size: 0.6rem;
      flex-shrink: 0;
      margin-top: 6px;
    }

    .variation-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .variation-list li {
      padding: 11px 16px;
      border-left: 5px solid var(--yellow);
      background: #fffbe6;
      border: 3px solid var(--black);
      border-left: 6px solid var(--yellow);
      font-size: 0.97rem;
      line-height: 1.55;
    }

    .purpose-box {
      background: var(--yellow);
      border: 4px solid var(--black);
      padding: 16px 20px;
      font-size: 0.97rem;
      line-height: 1.68;
      box-shadow: 5px 5px 0 var(--black);
      font-weight: 600;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--black);
      color: var(--yellow);
      border-top: 6px solid var(--yellow);
      padding: 14px 28px;
      text-align: center;
    }
    .footer-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 20px;
      justify-content: center;
      align-items: center;
    }
    .footer-name {
      font-family: 'Anton', sans-serif;
      letter-spacing: 0.12em;
      font-size: 1rem;
    }
    .footer-sep { color: var(--red); font-weight: bold; font-size: 1.1rem; }
    .footer-link {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.88rem;
      color: var(--yellow);
      text-decoration: none;
      letter-spacing: 0.05em;
      opacity: 0.85;
    }
    .footer-link:hover { opacity: 1; text-decoration: underline; }

    /* ── INSTALL BANNER ── */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--blue);
      color: var(--white);
      padding: 12px 20px;
      z-index: 999;
      border-top: 4px solid var(--yellow);
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .install-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .install-actions { display: flex; gap: 10px; flex-shrink: 0; }
    .install-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 16px;
      border: 3px solid var(--yellow);
      cursor: pointer;
      background: var(--yellow);
      color: var(--black);
    }
    .install-dismiss {
      background: transparent;
      color: var(--white);
      border-color: rgba(255,255,255,0.4);
    }

    /* ── TRANSITIONS ── */
    .fade-in { animation: fadeIn 0.18s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      main { padding: 20px 16px; }
      .game-detail-header { padding: 20px 20px; }
      .game-section { padding: 18px 20px; }
      .games-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .alpha-heading { font-size: 2.2rem; }
    }
    @media (max-width: 400px) {
      .games-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="dots-bg">

  <header>
    <div class="header-inner">
      <a class="logo-link" href="#" aria-label="Home">
        <svg class="logo-icon" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Face background -->
          <ellipse cx="60" cy="64" rx="52" ry="54" fill="#FFD60A" stroke="#0D0D0D" stroke-width="5"/>
          <!-- Eyebrows - raised high for exaggerated surprise/excitement -->
          <path d="M 20 34 Q 38 20 52 30" fill="none" stroke="#0D0D0D" stroke-width="6" stroke-linecap="round"/>
          <path d="M 68 30 Q 82 20 100 34" fill="none" stroke="#0D0D0D" stroke-width="6" stroke-linecap="round"/>
          <!-- Eyes - wide open, excited -->
          <ellipse cx="38" cy="52" rx="16" ry="18" fill="white" stroke="#0D0D0D" stroke-width="4"/>
          <circle cx="41" cy="55" r="10" fill="#0D0D0D"/>
          <circle cx="45" cy="50" r="4" fill="white"/>
          <ellipse cx="82" cy="52" rx="16" ry="18" fill="white" stroke="#0D0D0D" stroke-width="4"/>
          <circle cx="85" cy="55" r="10" fill="#0D0D0D"/>
          <circle cx="89" cy="50" r="4" fill="white"/>
          <!-- Mouth - wide open shout -->
          <ellipse cx="60" cy="96" rx="32" ry="22" fill="#E63946" stroke="#0D0D0D" stroke-width="4"/>
          <!-- Top teeth -->
          <rect x="34" y="84" width="52" height="13" rx="2" fill="white"/>
          <line x1="51" y1="84" x2="51" y2="97" stroke="#0D0D0D" stroke-width="1.5"/>
          <line x1="60" y1="84" x2="60" y2="97" stroke="#0D0D0D" stroke-width="1.5"/>
          <line x1="69" y1="84" x2="69" y2="97" stroke="#0D0D0D" stroke-width="1.5"/>
          <!-- Tongue -->
          <ellipse cx="60" cy="108" rx="20" ry="10" fill="#C1121F"/>
          <!-- Cheek dots - pop art detail -->
          <circle cx="20" cy="72" r="5" fill="rgba(230,57,70,0.4)"/>
          <circle cx="15" cy="64" r="3" fill="rgba(230,57,70,0.3)"/>
          <circle cx="100" cy="72" r="5" fill="rgba(230,57,70,0.4)"/>
          <circle cx="105" cy="64" r="3" fill="rgba(230,57,70,0.3)"/>
        </svg>
      </a>
      <div class="header-text">
        <h1>100 Awesome<br>Drama Games</h1>
        <div class="subtitle">For High School Students</div>
      </div>
    </div>
  </header>

  <div class="search-wrap" id="search-wrap">
    <div class="search-inner">
      <input type="search" id="search" placeholder="Search games…" aria-label="Search games" autocomplete="off">
      <span class="search-icon" aria-hidden="true">🔍</span>
    </div>
  </div>

  <main>
    <div id="home-view">
      <div id="games-container"></div>
    </div>
    <div id="game-view">
      <button class="back-btn" id="back-btn" aria-label="Back to all games">
        ← All Games
      </button>
      <div id="game-detail-content"></div>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <span class="footer-name">Justin Cash</span>
      <span class="footer-sep">|</span>
      <a class="footer-link" href="https://thedramateacher.com" target="_blank" rel="noopener">thedramateacher.com</a>
      <span class="footer-sep">|</span>
      <a class="footer-link" href="https://dramapuzzles.com" target="_blank" rel="noopener">dramapuzzles.com</a>
      <span class="footer-sep">|</span>
      <a class="footer-link" href="https://drama.education" target="_blank" rel="noopener">drama.education</a>
    </div>
  </footer>

  <div id="install-banner" role="status">
    <span class="install-text">Add to your home screen for quick access!</span>
    <div class="install-actions">
      <button class="install-btn install-dismiss" id="install-dismiss">Not now</button>
      <button class="install-btn" id="install-btn">Install</button>
    </div>
  </div>

  <script src="games-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
